<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suffix - Daily Word Game</title>
    <link rel="stylesheet" href="style.css?v=2.3">
</head>
<body>

    <div id="game-container">
        <header>
            <h1>SUFFIX</h1>
            <p id="date-display"></p>
        </header>

        <div id="main-stage">
            <div id="loading-display">Loading Dictionary...</div>
            <div class="word-display" id="word-display"></div>
        </div>
        
        <div id="controls">
            <button class="btn-close" onclick="closeWord()">Close Word</button>
            <input type="text" id="letter-input" maxlength="1" style="opacity: 0; position: absolute; pointer-events: none;">
        </div>

        <div id="keyboard-container"></div>

        <p class="message" id="message"></p>
        
        <button class="share-btn" id="share-btn" onclick="shareResult()">Share Result ⎘</button>
    </div>

    <script src="script.js?v=2.3"></script>
</body>
</html>
