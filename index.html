<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suffixes - Daily Word Game</title>
    <link rel="stylesheet" href="style.css?v=14.1">
</head>
<body>
    <div id="game-container">
        <header>
            <div class="top-bar">
                <button class="icon-btn" onclick="toggleTheme()">🌓</button>
                <h1 style="margin:0">SUFFIXES</h1>
                <div style="display: flex; gap: 5px;">
                    <button class="icon-btn" onclick="showInstructions()">ℹ️</button>
                    <button class="icon-btn" onclick="showStats()">📊</button>
                </div>
            </div>
            <p id="date-display"></p>
        </header>

        <div id="main-stage">
            <div id="loading-display">Loading Dictionary...</div>
            <div id="longest-word-hint" style="font-size: 0.8rem; color: #6c757d; margin-bottom: 10px;"></div>
            <div class="word-display" id="word-display" style="display: none;"></div>
            <div id="solution-display"></div>
        </div>
        
        <div id="controls">
            <button class="btn-claim" id="claim-btn" onclick="claimWord()">Claim Word</button>
            <button class="btn-pass" id="pass-btn" onclick="passTurn()">Pass Turn</button>
        </div>

        <div id="keyboard-container"></div>
        <p class="message" id="message"></p>
        <button class="share-btn" id="share-btn" onclick="shareResult()">Share Result ⎘</button>
    </div>

    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeStats()">&times;</span>
            <h2>Statistics</h2>
            <div id="stats-body"></div>
            <button class="btn-pass" style="width:100%; margin-top:20px" onclick="closeStats()">Close</button>
        </div>
    </div>

    <div id="instructions-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeInstructions()">&times;</span>
            <h2>How to Play</h2>
            <p>Add one letter, then <strong>Pass</strong> or <strong>Claim</strong>.</p>
            <p>If you claim a word, it must be valid. If you pass, the computer will add a letter.</p>
            <p>The computer is always trying to form the <strong>shortest</strong> possible word</p>
            <p>What's the longest word you can make?</p>
            <button class="btn-pass" style="width:100%; margin-top:20px" onclick="closeInstructions()">Got it!</button>
        </div>
    </div>

    <script src="script.js?v=14.1"></script>
</body>
</html>
