<div id="game-container">
    <h1>SUFFIX</h1>
    <p id="date-display"></p>
    <div class="word-display" id="word-display">---</div>
    
    <div id="controls">
        <div class="input-section">
            <input type="text" id="letter-input" maxlength="1" autofocus style="opacity: 0; position: absolute; pointer-events: none;">
            <div class="button-group">
                <button class="btn-close" onclick="closeWord()">Close Word</button>
            </div>
        </div>
    </div>

    <div id="keyboard-container"></div>

    <p class="message" id="message"></p>
    <button class="share-btn" id="share-btn" onclick="shareResult()">Share Result ⎘</button>
</div>
