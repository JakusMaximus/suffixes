<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suffixes - Daily Word Game</title>
    <link rel="stylesheet" href="style.css?v=2.5">
</head>
<body>

    <div id="game-container">
        <header>
            <h1>SUFFIXES</h1>
            <p id="date-display"></p>
        </header>

        <div id="main-stage">
            <div id="loading-display">Loading Dictionary...</div>
            <div id="instructions">Add a letter, then choose to Pass to the Computer or Claim a valid Word. What's the longest word you can make?</div>
            <div class="word-display" id="word-display"></div>
        </div>
        
        <div id="controls">
            <button class="btn-claim" onclick="claimWord()">Claim Word</button>
            <button class="btn-pass" id="pass-btn" onclick="triggerComputer()">Pass to Computer</button>
            <input type="text" id="letter-input" maxlength="1" style="opacity: 0; position: absolute; pointer-events: none;">
        </div>

        <div id="keyboard-container"></div>

        <p class="message" id="message"></p>
        
        <button class="share-btn" id="share-btn" onclick="shareResult()">Share Result ⎘</button>
    </div>

    <script src="script.js?v=2.5"></script>
</body>
</html>
